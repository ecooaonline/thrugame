<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThruCafé Tower Defense</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#0a0c12;display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',system-ui,sans-serif;color:#fff;overflow:hidden}
#gameWrapper{position:relative;width:960px;height:640px;min-width:960px;box-shadow:0 0 0 2px #1E3A8A,0 0 40px rgba(30,58,138,.6);border-radius:4px;overflow:hidden}
#gameCanvas{display:block;width:960px;height:640px;background:#111827}
#topBar{position:absolute;top:0;left:0;right:0;height:40px;background:rgba(5,8,18,.92);border-bottom:1px solid rgba(30,58,138,.5);display:flex;align-items:center;padding:0 14px;gap:0;z-index:20;pointer-events:none}
.hud-stat{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:600;color:#e2e8f0;padding:0 14px;height:100%;border-right:1px solid rgba(255,255,255,.08);white-space:nowrap}
.hud-stat:last-child{border-right:none}
.stat-icon{font-size:15px}.stat-label{color:#94a3b8;font-weight:400}.stat-value{font-weight:700}
.stat-lives .stat-value{color:#f87171}.stat-gold .stat-value{color:#fbbf24}.stat-wave .stat-value{color:#60a5fa}.stat-score{margin-left:auto}.stat-score .stat-value{color:#a78bfa}
#shopBar{position:absolute;bottom:0;left:0;right:0;height:82px;background:rgba(5,8,18,.95);border-top:1px solid rgba(30,58,138,.55);display:flex;align-items:center;justify-content:center;gap:6px;padding:0 10px;z-index:20;pointer-events:all}
.tower-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;width:110px;height:64px;background:linear-gradient(145deg,rgba(30,58,138,.35),rgba(15,23,60,.6));border:1px solid rgba(30,58,138,.6);border-radius:6px;cursor:pointer;transition:all .18s ease;padding:4px;pointer-events:all;position:relative}
.tower-btn:hover:not(.disabled){background:linear-gradient(145deg,rgba(232,120,30,.22),rgba(30,58,138,.45));border-color:#E8781E;transform:translateY(-2px);box-shadow:0 4px 16px rgba(232,120,30,.35)}
.tower-btn.disabled{opacity:.38;cursor:not-allowed;filter:grayscale(60%)}
.tower-btn .shop-icon{width:32px;height:32px;display:flex;align-items:center;justify-content:center}
.tower-btn .shop-icon canvas{display:block}
.btn-name{font-size:10px;font-weight:700;color:#e2e8f0;letter-spacing:.3px;text-transform:uppercase}
.btn-cost{font-size:11px;font-weight:600;color:#fbbf24}
#infoPanel{position:absolute;top:40px;right:0;width:160px;bottom:82px;background:rgba(5,8,22,.93);border-left:1px solid rgba(30,58,138,.5);padding:10px 8px;display:none;flex-direction:column;gap:6px;z-index:18;pointer-events:all}
#infoPanel .panel-row{font-size:11px;color:#94a3b8;display:flex;justify-content:space-between}
#infoPanel .panel-row span:last-child{color:#e2e8f0;font-weight:600}
#infoName{font-size:14px;font-weight:700;color:#E8781E;text-align:center;border-bottom:1px solid rgba(232,120,30,.3);padding-bottom:5px}
#infoLevel{font-size:11px;color:#fbbf24;text-align:center;font-weight:600}
.btn-action{width:100%;padding:6px;border-radius:5px;border:none;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.3px;transition:all .15s ease}
#upgradeBtn{background:linear-gradient(135deg,#E8781E,#c9600e);color:#fff;box-shadow:0 2px 8px rgba(232,120,30,.4)}
#upgradeBtn:hover{background:linear-gradient(135deg,#f4892e,#d9701e);transform:translateY(-1px)}
#upgradeBtn:disabled{opacity:.5;cursor:not-allowed;transform:none}
#sellBtn{background:linear-gradient(135deg,rgba(30,58,138,.7),rgba(15,30,80,.9));color:#93c5fd;border:1px solid rgba(30,58,138,.8)}
#sellBtn:hover{background:#1E3A8A;color:#bfdbfe;transform:translateY(-1px)}
#controls{position:absolute;top:48px;left:8px;display:flex;flex-direction:column;gap:5px;z-index:20;pointer-events:all}
.ctrl-btn{display:flex;align-items:center;justify-content:center;gap:4px;border:none;border-radius:5px;font-family:inherit;font-weight:700;cursor:pointer;transition:all .15s ease;white-space:nowrap;font-size:12px;padding:7px 14px}
#nextWaveBtn{background:linear-gradient(135deg,#E8781E,#b85e10);color:#fff;box-shadow:0 3px 12px rgba(232,120,30,.45);text-transform:uppercase;font-size:13px}
#nextWaveBtn:hover{background:linear-gradient(135deg,#f48930,#c9690e);transform:translateY(-1px)}
#nextWaveBtn:disabled{opacity:.5;cursor:not-allowed;transform:none}
#speedBtn{background:rgba(30,58,138,.75);color:#93c5fd;border:1px solid rgba(30,58,138,.7)}
#speedBtn:hover{background:#1E3A8A;color:#bfdbfe}
#pauseBtn{background:rgba(51,65,85,.75);color:#cbd5e1;border:1px solid rgba(100,116,139,.4)}
#pauseBtn:hover{background:rgba(71,85,105,.85);color:#f1f5f9}
.modal-overlay{position:absolute;inset:0;background:rgba(5,8,18,.85);backdrop-filter:blur(5px);display:none;align-items:center;justify-content:center;z-index:100}
.modal-card{background:linear-gradient(160deg,rgba(15,22,48,.97),rgba(8,14,32,.99));border:1px solid rgba(30,58,138,.7);border-radius:12px;padding:36px 44px;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.7);display:flex;flex-direction:column;align-items:center;gap:16px;min-width:320px}
.modal-btn-group{display:flex;gap:12px;margin-top:6px;flex-wrap:wrap;justify-content:center}
.modal-btn{padding:10px 26px;border-radius:7px;border:none;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;text-transform:uppercase;transition:all .15s ease}
.modal-btn.primary{background:linear-gradient(135deg,#E8781E,#b85e10);color:#fff;box-shadow:0 4px 16px rgba(232,120,30,.45)}
.modal-btn.primary:hover{transform:translateY(-2px);box-shadow:0 7px 22px rgba(232,120,30,.6)}
.modal-btn.secondary{background:linear-gradient(135deg,#1E3A8A,#152b6e);color:#93c5fd;box-shadow:0 4px 16px rgba(30,58,138,.4)}
.modal-btn.secondary:hover{transform:translateY(-2px);color:#bfdbfe}
.logo-text{font-size:44px;font-weight:900;background:linear-gradient(135deg,#E8781E,#fbbf24,#E8781E);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 18px rgba(232,120,30,.55))}
.logo-sub{font-size:14px;font-weight:600;color:#64748b;letter-spacing:4px;text-transform:uppercase;margin-top:-4px}
.logo-tagline{font-size:13px;color:#475569;font-style:italic}
.go-title{font-size:38px;font-weight:900;color:#f87171;text-shadow:0 0 20px rgba(248,113,113,.6)}
.go-score-label{font-size:13px;color:#64748b;text-transform:uppercase;letter-spacing:2px}
.go-score-value{font-size:32px;font-weight:800;color:#a78bfa}
.vic-title{font-size:38px;font-weight:900;background:linear-gradient(135deg,#fbbf24,#E8781E);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.vic-stats{display:flex;flex-direction:column;gap:6px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:14px 24px;width:100%}
.vic-stat-row{display:flex;justify-content:space-between;font-size:13px}
.vic-stat-row .v-label{color:#64748b;text-transform:uppercase;font-size:11px;letter-spacing:.8px}
.vic-stat-row .v-value{font-weight:700;color:#e2e8f0}
#errorMessages{position:absolute;top:50px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:5px;z-index:90;pointer-events:none;width:360px}
.error-msg{background:rgba(185,28,28,.9);border:1px solid rgba(252,165,165,.3);border-radius:6px;padding:7px 16px;font-size:12px;font-weight:600;color:#fecaca;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.5);animation:errIn .25s ease both;pointer-events:none}
.error-msg.fade-out{animation:errOut .4s ease both}
@keyframes errIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes errOut{from{opacity:1}to{opacity:0;transform:translateY(-8px)}}
</style>
</head>

<div class="modal-overlay" id="titleScreen" style="display:flex">
<div class="modal-card">
<div class="logo-text">ThruCafe</div>
<div class="logo-sub">Tower Defense</div>
<div class="logo-tagline">Defenda o cafe a qualquer custo!</div>
<div class="modal-btn-group">
<button class="modal-btn primary" id="startBtn">Iniciar</button>
<button class="modal-btn secondary" id="loadBtn">Carregar</button>
</div>
</div>
</div>
<div class="modal-overlay" id="gameOverScreen">
<div class="modal-card">
<div class="go-title">Game Over!</div>
<div><div class="go-score-label">Pontuacao Final</div><div class="go-score-value" id="finalScore">0</div></div>
<div class="modal-btn-group">
<button class="modal-btn primary" id="restartBtn">Recomecar</button>
<button class="modal-btn secondary" id="menuBtn">Menu</button>
</div>
</div>
</div>
<div class="modal-overlay" id="victoryScreen">
<div class="modal-card">
<div class="vic-title">Parabens! Voce venceu!</div>
<div class="vic-stats">
<div class="vic-stat-row"><span class="v-label">Pontuacao</span><span class="v-value" id="victoryScore">0</span></div>
<div class="vic-stat-row"><span class="v-label">Tempo</span><span class="v-value" id="victoryTime">0:00</span></div>
</div>
<div class="modal-btn-group">
<button class="modal-btn primary" id="menuBtnVictory">Menu</button>
</div>
</div>
</div>
</div>

// ================================================================

const WAVES=[
[['ze_caneca',5]],[['ze_caneca',8],['nene',2]],[['ze_caneca',10],['nene',3]],
[['ze_caneca',5],['nene',5],['cachaceiro',2]],[['ze_caneca',8],['nene',4],['cachaceiro',3]],

[['cachaceiro',6],['mae_cafe',2],['nene',5]],[['gordona',3],['mae_cafe',2],['nene',4]],
[['geek',8],['cachaceiro',5],['juca',1]],[['geek',12],['nene',6]],
[['mae_cafe',4],['gordona',3],['geek',6]],[['juca',3],['gordona',4],['cachaceiro',6]],
[['bugue',2],['mae_cafe',3],['nene',8]],[['geek',15],['juca',2],['bugue',1]],
[['gordona',5],['bugue',2],['mae_cafe',4]],[['cachaceiro',10],['juca',4],['gordona',3]],

const ROUTE_A=[{c:4,r:6},{c:4,r:5},{c:5,r:5},{c:6,r:5},{c:7,r:5},{c:8,r:5},{c:9,r:5},{c:9,r:6},{c:9,r:7}];

const UI_TEXT={lives:'Vidas',gold:'Ouro',wave:'Onda',score:'Pontos',nextWave:'Proxima Onda',pause:'Pausar',resume:'Continuar',upgrade:'Melhorar',sell:'Vender',noGold:'Ouro insuficiente!',maxLevel:'Torre no maximo!',cantBuild:'Nao pode construir aqui!',level:'Nivel',damage:'Dano',range:'Alcance',fireRate:'Cadencia',effect:'Efeito'};
// ================================================================
// SECTION 2: COORDINATE SYSTEM & TILE RENDERING
// ================================================================
function gridToScreen(col,row){return{x:OFFSET_X+(col-row)*(TILE_W/2),y:OFFSET_Y+(col+row)*(TILE_H/2)}}
function screenToGrid(x,y){const dx=x-OFFSET_X,dy=y-OFFSET_Y;return{col:Math.round((dx/(TILE_W/2)+dy/(TILE_H/2))/2),row:Math.round((dy/(TILE_H/2)-dx/(TILE_W/2))/2)}}
function gridDistance(c1,r1,c2,r2){const p1=gridToScreen(c1,r1),p2=gridToScreen(c2,r2);return Math.sqrt((p1.x-p2.x)**2+(p1.y-p2.y)**2)/(TILE_W/2)}

function drawIsoDiamond(ctx,x,y,fill,stroke){
ctx.beginPath();ctx.moveTo(x,y-TILE_H/2);ctx.lineTo(x+TILE_W/2,y);ctx.lineTo(x,y+TILE_H/2);ctx.lineTo(x-TILE_W/2,y);ctx.closePath();
ctx.fillStyle=fill;ctx.fill();if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=1;ctx.stroke()}}

function drawGrassTile(ctx,sx,sy){
ctx.save();drawIsoDiamond(ctx,sx,sy,'#4a8c2a','#3a7020');
ctx.beginPath();ctx.moveTo(sx,sy-TILE_H/2);ctx.lineTo(sx+TILE_W/2,sy);ctx.lineTo(sx,sy+TILE_H/2);ctx.lineTo(sx-TILE_W/2,sy);ctx.closePath();ctx.clip();
const dots=[[-8,-4,2.5,'#5a9c3a'],[6,-6,2,'#3d7a22'],[-14,2,2,'#5a9c3a'],[14,0,2.5,'#3d7a22'],[0,6,2,'#5a9c3a'],[-6,8,1.5,'#3d7a22'],[10,6,2,'#5a9c3a']];
dots.forEach(d=>{ctx.beginPath();ctx.arc(sx+d[0],sy+d[1],d[2],0,Math.PI*2);ctx.fillStyle=d[3];ctx.fill()});
ctx.restore()}

function drawPathTile(ctx,sx,sy){
ctx.save();drawIsoDiamond(ctx,sx,sy,'#c8a882','#8a6a42');
ctx.beginPath();ctx.moveTo(sx,sy-TILE_H/2);ctx.lineTo(sx+TILE_W/2,sy);ctx.lineTo(sx,sy+TILE_H/2);ctx.lineTo(sx-TILE_W/2,sy);ctx.closePath();ctx.clip();
const stones=[[-16,-4,12,5],[2,-6,12,5],[16,-3,10,4],[-22,2,10,4],[-8,2,13,5],[8,1,11,4],[20,3,9,4],[-18,8,11,4],[-3,8,12,4],[14,7,10,4]];
stones.forEach(s=>{const shade=(Math.abs(s[0]+s[1])%3===0)?'#bfa070':'#c8a882';ctx.fillStyle=shade;ctx.fillRect(sx+s[0]-s[2]/2,sy+s[1]-s[3]/2,s[2],s[3]);ctx.strokeStyle='#a88a62';ctx.lineWidth=1;ctx.stroke()});
ctx.restore()}

function drawBuildingTile(ctx,sx,sy,row,col){
drawGrassTile(ctx,sx,sy);if(row!==8||col!==13)return;
ctx.save();const wallH=80;
const tN={x:sx,y:sy-TILE_H},tE={x:sx+TILE_W,y:sy},tW={x:sx-TILE_W,y:sy};
// Left face
ctx.beginPath();ctx.moveTo(tW.x,tW.y);ctx.lineTo(tN.x,tN.y);ctx.lineTo(tN.x,tN.y-wallH);ctx.lineTo(tW.x,tW.y-wallH);ctx.closePath();ctx.fillStyle='#c66a15';ctx.fill();ctx.strokeStyle='#a05510';ctx.lineWidth=1;ctx.stroke();
// Left window
let mx=(tW.x+tN.x)/2,my=(tW.y+tN.y)/2-wallH/2-4;ctx.fillStyle='#1E3A8A';ctx.fillRect(mx-5,my-6,10,12);ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.strokeRect(mx-5,my-6,10,12);
// Right face
ctx.beginPath();ctx.moveTo(tN.x,tN.y);ctx.lineTo(tE.x,tE.y);ctx.lineTo(tE.x,tE.y-wallH);ctx.lineTo(tN.x,tN.y-wallH);ctx.closePath();ctx.fillStyle='#d47518';ctx.fill();ctx.strokeStyle='#a05510';ctx.lineWidth=1;ctx.stroke();
// Door
mx=(tN.x+tE.x)/2;let bBase=(tN.y+tE.y)/2;ctx.fillStyle='#1E3A8A';ctx.fillRect(mx-5,bBase-18,10,18);ctx.beginPath();ctx.arc(mx,bBase-18,5,Math.PI,0);ctx.fill();ctx.fillStyle='#ffd700';ctx.beginPath();ctx.arc(mx+2,bBase-9,1.5,0,Math.PI*2);ctx.fill();
// Right window
ctx.fillStyle='#1E3A8A';ctx.fillRect(mx+8,(tN.y+tE.y)/2-wallH*0.55-5,9,11);ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.strokeRect(mx+8,(tN.y+tE.y)/2-wallH*0.55-5,9,11);
// ThruCafe text
ctx.save();ctx.translate(mx-8,(tN.y+tE.y)/2-wallH*0.78);ctx.transform(1,0.25,0,1,0,0);ctx.font='bold 8px sans-serif';ctx.fillStyle='#fff';ctx.fillText('ThruCafe',-14,0);ctx.restore();
// Roof
ctx.beginPath();ctx.moveTo(tN.x,tN.y-wallH);ctx.lineTo(tE.x,tE.y-wallH);ctx.lineTo(sx,sy-wallH+TILE_H);ctx.lineTo(tW.x,tW.y-wallH);ctx.closePath();
const rg=ctx.createLinearGradient(tN.x,tN.y-wallH,sx,sy-wallH+TILE_H);rg.addColorStop(0,'#f5a040');rg.addColorStop(1,'#e88020');ctx.fillStyle=rg;ctx.fill();ctx.strokeStyle='#1E3A8A';ctx.lineWidth=2.5;ctx.stroke();
// Chimney
ctx.fillStyle='#c66a15';ctx.fillRect(tN.x+4,tN.y-wallH-12,8,10);ctx.fillStyle='#a05510';ctx.fillRect(tN.x+3,tN.y-wallH-14,10,3);
ctx.restore()}

function renderMap(ctx){
for(let row=0;row<15;row++)for(let col=0;col<15;col++){
const pos=gridToScreen(col,row),tile=MAP[row][col];
if(tile===0)drawGrassTile(ctx,pos.x,pos.y);
else if(tile===1)drawPathTile(ctx,pos.x,pos.y);
else if(tile===2)drawBuildingTile(ctx,pos.x,pos.y,row,col);
else if(tile===3){drawGrassTile(ctx,pos.x,pos.y);drawTreeDecoration(ctx,pos.x,pos.y)}}}

function drawRangeCircle(ctx,col,row,range){
const pos=gridToScreen(col,row),rx=range*(TILE_W/2),ry=range*(TILE_H/2);
ctx.save();ctx.globalAlpha=0.15;ctx.fillStyle='#0f0';ctx.beginPath();ctx.ellipse(pos.x,pos.y,rx,ry,0,0,Math.PI*2);ctx.fill();
ctx.globalAlpha=0.5;ctx.strokeStyle='#0f0';ctx.lineWidth=2;ctx.stroke();ctx.restore()}

function drawPlacementOverlay(ctx,col,row,ok){
const pos=gridToScreen(col,row);ctx.save();ctx.globalAlpha=0.3;ctx.fillStyle=ok?'#0f0':'#f00';
ctx.beginPath();ctx.moveTo(pos.x,pos.y-TILE_H/2);ctx.lineTo(pos.x+TILE_W/2,pos.y);ctx.lineTo(pos.x,pos.y+TILE_H/2);ctx.lineTo(pos.x-TILE_W/2,pos.y);ctx.closePath();ctx.fill();ctx.restore()}

for(const[k,fn]of Object.entries(eFns)){const c=document.createElement('canvas');c.width=160;c.height=180;fn(c.getContext('2d'),160,180);enemySprites[k]=c}
// Shop icons

types.forEach(t=>{const btn=document.getElementById('shop-'+t);if(!btn)return;const ic=btn.querySelector('.shop-icon');if(!ic)return;const c=document.createElement('canvas');c.width=32;c.height=36;const ctx=c.getContext('2d');ctx.save();ctx.scale(32/160,36/180);tFns[t](ctx,160,180);ctx.restore();ic.appendChild(c)})}
// ================================================================
// SECTION 5: GAME STATE & MECHANICS
// ================================================================
const gameState={gold:INITIAL_GOLD,lives:INITIAL_LIVES,score:0,waveIndex:0,speed:1,paused:false,phase:'title',selectedTower:null,placingTower:null,startTime:0,totalTime:0};
let towers=[],enemies=[],projectiles=[],particles=[],pendingSpawns=[],spawnTimer=0;

function createTower(type,col,row){const d=TOWER_DATA[type];return{id:Date.now()+Math.random(),type,col,row,level:0,totalInvested:d.cost,cooldown:0,target:null}}
function getTowerStats(t){const d=TOWER_DATA[t.type],m=UPGRADE_MULTIPLIERS[t.level];return{damage:Math.round(d.damage*m),range:d.range+t.level*0.3,fireRate:d.fireRate+t.level*0.2}}
function getUpgradeCost(t){return Math.round(TOWER_DATA[t.type].cost*(t.level+2)*0.75)}
function getSellValue(t){return Math.round(t.totalInvested*SELL_RATIO)}

function createEnemy(type){
const d=ENEMY_DATA[type],path=ALL_PATHS[Math.floor(Math.random()*4)];
const ws=gameState.waveIndex>20?1+(gameState.waveIndex-20)*0.03:1;
return{id:Date.now()+Math.random(),type,hp:Math.round(d.hp*ws),maxHp:Math.round(d.hp*ws),shield:d.shield||0,maxShield:d.shield||0,speed:d.speed,gold:d.gold,dodge:d.dodge||0,livesLost:d.lives||1,splits:d.splits,bossImmune:d.bossImmune,path,pathIndex:0,pathProgress:0,x:0,y:0,gridCol:path[0].c,gridRow:path[0].r,effects:{slow:0,burn:0,confusion:0,defReduce:0},burnDamage:0,alive:true,reachedEnd:false,isSplit:false}}

function updateTowers(dt){
for(const tower of towers){
tower.cooldown-=dt;if(tower.cooldown>0)continue;
const stats=getTowerStats(tower),data=TOWER_DATA[tower.type];
let best=null,bestP=-Infinity;
for(const e of enemies){if(!e.alive)continue;const dist=gridDistance(tower.col,tower.row,e.gridCol,e.gridRow);if(dist<=stats.range){const p=e.pathIndex+e.pathProgress;if(p>bestP){bestP=p;best=e}}}
if(!best)continue;tower.cooldown=1/stats.fireRate;tower.target=best;
if(data.type==='melee'){applyDamage(best,stats.damage,data.effect,data.effectDuration,data.effectPower);playSound('shoot')}
else{createProjectile(tower,best,stats.damage,data.effect,data.effectDuration,data.effectPower);playSound('shoot')}}}

function updateEnemies(dt){
for(const e of enemies){
if(!e.alive)continue;
if(e.effects.slow>0)e.effects.slow-=dt;
if(e.effects.burn>0){e.effects.burn-=dt;e.hp-=e.burnDamage*dt;if(e.hp<=0){killEnemy(e);continue}}
if(e.effects.confusion>0)e.effects.confusion-=dt;
if(e.effects.defReduce>0)e.effects.defReduce-=dt;
let spd=e.speed;if(e.effects.slow>0&&!e.bossImmune)spd*=0.5;
const dir=e.effects.confusion>0?-0.3:1;
e.pathProgress+=spd*dt*1.5*dir;
while(e.pathProgress>=1&&e.pathIndex<e.path.length-1){e.pathProgress-=1;e.pathIndex++}
while(e.pathProgress<0&&e.pathIndex>0){e.pathProgress+=1;e.pathIndex--}
e.pathProgress=Math.max(0,e.pathProgress);
if(e.pathIndex>=e.path.length-1&&e.pathProgress>=1){e.reachedEnd=true;e.alive=false;gameState.lives-=e.livesLost;if(gameState.lives<=0){gameState.lives=0;gameState.phase='gameOver'}continue}
const cur=e.path[Math.min(e.pathIndex,e.path.length-1)],nxt=e.path[Math.min(e.pathIndex+1,e.path.length-1)],t=Math.min(e.pathProgress,1);
const p1=gridToScreen(cur.c,cur.r),p2=gridToScreen(nxt.c,nxt.r);
e.x=p1.x+(p2.x-p1.x)*t;e.y=p1.y+(p2.y-p1.y)*t;
e.gridCol=cur.c+(nxt.c-cur.c)*t;e.gridRow=cur.r+(nxt.r-cur.r)*t}
enemies=enemies.filter(e=>e.alive)}

function applyDamage(e,dmg,effect,dur,power){
if(e.dodge>0&&Math.random()<e.dodge){addParticle(e.x,e.y-20,'MISS','#aaa');return}
let d=dmg;if(e.effects.defReduce>0)d=Math.round(dmg*1.25);
if(e.shield>0){if(d<=e.shield){e.shield-=d;d=0}else{d-=e.shield;e.shield=0}}
e.hp-=d;if(d>0)addParticle(e.x,e.y-20,'-'+d,'#ff4444');
if(effect&&dur>0){
if(effect==='slow'&&!e.bossImmune)e.effects.slow=dur;
else if(effect==='burn'){e.effects.burn=dur;e.burnDamage=power}
else if(effect==='confusion'&&!e.bossImmune)e.effects.confusion=dur;
else if(effect==='defReduce')e.effects.defReduce=dur}
if(e.hp<=0)killEnemy(e)}

function killEnemy(e){
if(!e.alive)return;e.alive=false;gameState.gold+=e.gold;gameState.score+=e.gold*2;playSound('enemy_death');addParticle(e.x,e.y-10,'+'+e.gold+'g','#ffd700');
if(e.splits&&!e.isSplit){for(let i=0;i<2;i++){const s=createEnemy(e.type);s.hp=Math.round(e.maxHp*0.5);s.maxHp=s.hp;s.gold=Math.round(e.gold*0.5);s.splits=false;s.isSplit=true;s.path=e.path;s.pathIndex=e.pathIndex;s.pathProgress=Math.max(0,e.pathProgress+(i*0.3-0.15));s.x=e.x+(i*20-10);s.y=e.y;s.gridCol=e.gridCol;s.gridRow=e.gridRow;enemies.push(s)}}}

function createProjectile(tower,target,dmg,effect,dur,power){
const p=gridToScreen(tower.col,tower.row);projectiles.push({x:p.x,y:p.y-15,targetId:target.id,damage:dmg,effect,effectDuration:dur,effectPower:power,speed:250,towerType:tower.type})}

function updateProjectiles(dt){
for(let i=projectiles.length-1;i>=0;i--){const p=projectiles[i];const t=enemies.find(e=>e.id===p.targetId&&e.alive);
if(!t){projectiles.splice(i,1);continue}
const dx=t.x-p.x,dy=(t.y-15)-p.y,dist=Math.sqrt(dx*dx+dy*dy);
if(dist<8){applyDamage(t,p.damage,p.effect,p.effectDuration,p.effectPower);projectiles.splice(i,1);continue}
const ms=p.speed*dt;p.x+=(dx/dist)*ms;p.y+=(dy/dist)*ms}}

function startWave(){
if(gameState.waveIndex>=WAVES.length){gameState.phase='victory';gameState.totalTime=Date.now()-gameState.startTime;return}
gameState.phase='waveActive';const wave=WAVES[gameState.waveIndex];pendingSpawns=[];
for(const[type,count]of wave)for(let i=0;i<count;i++)pendingSpawns.push(type);
for(let i=pendingSpawns.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pendingSpawns[i],pendingSpawns[j]]=[pendingSpawns[j],pendingSpawns[i]]}
spawnTimer=0}

function updateSpawning(dt){
if(!pendingSpawns.length)return;spawnTimer-=dt;if(spawnTimer<=0){const type=pendingSpawns.shift();const e=createEnemy(type);const sp=gridToScreen(e.path[0].c,e.path[0].r);e.x=sp.x;e.y=sp.y;enemies.push(e);spawnTimer=0.8}}

function checkWaveComplete(){
if(gameState.phase!=='waveActive')return;if(pendingSpawns.length>0)return;if(enemies.some(e=>e.alive))return;
gameState.waveIndex++;gameState.phase='building';playSound('wave_complete');
if(gameState.waveIndex>=WAVES.length){gameState.phase='victory';gameState.totalTime=Date.now()-gameState.startTime}}

function canPlaceTower(col,row){if(col<0||col>=15||row<0||row>=15)return false;if(MAP[row][col]!==0)return false;return!towers.some(t=>t.col===col&&t.row===row)}

function placeTower(type,col,row){
if(!canPlaceTower(col,row)){showError(UI_TEXT.cantBuild);return false}
if(gameState.gold<TOWER_DATA[type].cost){showError(UI_TEXT.noGold);return false}
gameState.gold-=TOWER_DATA[type].cost;towers.push(createTower(type,col,row));playSound('place');return true}

function upgradeTower(tower){
if(tower.level>=MAX_LEVEL){showError(UI_TEXT.maxLevel);return false}
const cost=getUpgradeCost(tower);if(gameState.gold<cost){showError(UI_TEXT.noGold);return false}
gameState.gold-=cost;tower.level++;tower.totalInvested+=cost;playSound('upgrade');return true}

function sellTower(tower){gameState.gold+=getSellValue(tower);towers=towers.filter(t=>t.id!==tower.id);gameState.selectedTower=null;playSound('sell')}

function addParticle(x,y,text,color){particles.push({x,y,text,color,life:1.5,maxLife:1.5,vy:-40})}
function updateParticles(dt){for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.life-=dt;p.y+=p.vy*dt;if(p.life<=0)particles.splice(i,1)}}
function renderParticles(ctx){for(const p of particles){const a=Math.max(0,p.life/p.maxLife);ctx.save();ctx.globalAlpha=a;ctx.fillStyle=p.color;ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.fillText(p.text,p.x,p.y);ctx.restore()}}

function update(dt){
if(gameState.paused||gameState.phase==='title'||gameState.phase==='gameOver'||gameState.phase==='victory')return;
const adt=dt*gameState.speed;updateSpawning(adt);updateEnemies(adt);updateTowers(adt);updateProjectiles(adt);updateParticles(adt);checkWaveComplete()}
// ================================================================
// SECTION 6: SOUND SYSTEM
// ================================================================
let audioCtx=null;
function initAudio(){audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function playSound(type){
if(!audioCtx)return;try{
const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);const n=audioCtx.currentTime;
switch(type){
case'shoot':o.frequency.setValueAtTime(400,n);o.frequency.linearRampToValueAtTime(200,n+.05);g.gain.setValueAtTime(.12,n);g.gain.linearRampToValueAtTime(0,n+.1);o.start(n);o.stop(n+.1);break;
case'place':o.frequency.setValueAtTime(600,n);o.frequency.linearRampToValueAtTime(800,n+.1);g.gain.setValueAtTime(.12,n);g.gain.linearRampToValueAtTime(0,n+.15);o.start(n);o.stop(n+.15);break;
case'upgrade':o.frequency.setValueAtTime(400,n);o.frequency.linearRampToValueAtTime(800,n+.15);g.gain.setValueAtTime(.12,n);g.gain.linearRampToValueAtTime(0,n+.2);o.start(n);o.stop(n+.2);break;
case'sell':o.frequency.setValueAtTime(300,n);o.frequency.linearRampToValueAtTime(150,n+.1);g.gain.setValueAtTime(.1,n);g.gain.linearRampToValueAtTime(0,n+.1);o.start(n);o.stop(n+.1);break;
case'enemy_death':o.frequency.setValueAtTime(200,n);o.frequency.linearRampToValueAtTime(800,n+.1);g.gain.setValueAtTime(.12,n);g.gain.linearRampToValueAtTime(0,n+.15);o.start(n);o.stop(n+.15);break;
case'wave_complete':o.frequency.setValueAtTime(600,n);o.frequency.linearRampToValueAtTime(1200,n+.3);g.gain.setValueAtTime(.12,n);g.gain.linearRampToValueAtTime(0,n+.5);o.start(n);o.stop(n+.5);break;
}}catch(e){}}

// ================================================================
// SECTION 7: UI, RENDERING, EVENTS, SAVE/LOAD, GAME LOOP
// ================================================================
function showError(msg){const c=document.getElementById('errorMessages');if(!c)return;const el=document.createElement('div');el.className='error-msg';el.textContent=msg;c.appendChild(el);setTimeout(()=>el.classList.add('fade-out'),1500);setTimeout(()=>{if(el.parentNode)el.remove()},2000)}

function updateHUD(){
const lv=document.getElementById('livesVal'),gv=document.getElementById('goldVal'),wv=document.getElementById('waveVal'),sv=document.getElementById('scoreVal');
if(lv)lv.textContent=gameState.lives;if(gv)gv.textContent=gameState.gold;
if(wv)wv.textContent=(gameState.waveIndex+1)+'/'+WAVES.length;if(sv)sv.textContent=gameState.score;
['gordas','laugh','bandeus','dude','camarao','mano','rose'].forEach(t=>{const b=document.getElementById('shop-'+t);if(b)b.classList.toggle('disabled',gameState.gold<TOWER_DATA[t].cost)});
const nw=document.getElementById('nextWaveBtn');if(nw)nw.disabled=(gameState.phase==='waveActive')}

function updateInfoPanel(){
const panel=document.getElementById('infoPanel'),tower=gameState.selectedTower;
if(!tower){panel.style.display='none';return}
panel.style.display='flex';const stats=getTowerStats(tower),data=TOWER_DATA[tower.type];
document.getElementById('infoName').textContent=data.name;
document.getElementById('infoLevel').textContent=UI_TEXT.level+': '+(tower.level+1);
document.getElementById('infoDamage').textContent=stats.damage;
document.getElementById('infoRange').textContent=stats.range.toFixed(1);
document.getElementById('infoRate').textContent=stats.fireRate.toFixed(1)+'/s';
document.getElementById('infoEffect').textContent=data.effect||'-';
const ub=document.getElementById('upgradeBtn'),sb=document.getElementById('sellBtn');
if(tower.level>=MAX_LEVEL){ub.textContent=UI_TEXT.maxLevel;ub.disabled=true}
else{const c=getUpgradeCost(tower);ub.textContent=UI_TEXT.upgrade+' ('+c+'g)';ub.disabled=gameState.gold<c}
sb.textContent=UI_TEXT.sell+' ('+getSellValue(tower)+'g)'}

// --- Main Render ---
let mouseGridPos=null,mouseX=0,mouseY=0;

function render(){
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
ctx.clearRect(0,0,960,640);renderMap(ctx);
const drawables=[];
for(const t of towers){const p=gridToScreen(t.col,t.row);drawables.push({tp:'tower',obj:t,x:p.x,y:p.y,row:t.row,col:t.col})}
for(const e of enemies){if(!e.alive)continue;drawables.push({tp:'enemy',obj:e,x:e.x,y:e.y,row:e.gridRow,col:e.gridCol})}
drawables.sort((a,b)=>(a.row+a.col)-(b.row+b.col));
for(const d of drawables){if(d.tp==='tower')drawTowerOnMap(ctx,d.obj,d.x,d.y);else drawEnemyOnMap(ctx,d.obj,d.x,d.y)}
// Projectiles
for(const p of projectiles){let c='#E8781E';if(p.towerType==='gordas')c='#ff69b4';else if(p.towerType==='bandeus')c='#c39bd3';else if(p.towerType==='dude')c='#f39c12';else if(p.towerType==='rose')c='#2980b9';
ctx.fillStyle=c;ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#111';ctx.lineWidth=1;ctx.stroke()}
renderParticles(ctx);
if(gameState.selectedTower){const s=getTowerStats(gameState.selectedTower);drawRangeCircle(ctx,gameState.selectedTower.col,gameState.selectedTower.row,s.range)}
if(gameState.placingTower&&mouseGridPos){const ok=canPlaceTower(mouseGridPos.col,mouseGridPos.row);drawPlacementOverlay(ctx,mouseGridPos.col,mouseGridPos.row,ok);if(ok)drawRangeCircle(ctx,mouseGridPos.col,mouseGridPos.row,TOWER_DATA[gameState.placingTower].range)}
updateHUD();updateInfoPanel()}

function drawTowerOnMap(ctx,tower,x,y){
const sp=towerSprites[tower.type];if(sp){const sc=0.28,sw=sp.width*sc,sh=sp.height*sc;ctx.drawImage(sp,x-sw/2,y-sh+8,sw,sh)}
if(tower.level>0){ctx.fillStyle='#ffd700';ctx.font='10px sans-serif';ctx.textAlign='center';ctx.fillText('\u2605'.repeat(tower.level),x,y-38)}}

function drawEnemyOnMap(ctx,enemy,x,y){
const sp=enemySprites[enemy.type];if(!sp)return;
let sc=0.25;if(enemy.type==='don')sc=0.33;if(enemy.isSplit)sc=0.18;
const sw=sp.width*sc,sh=sp.height*sc;
ctx.save();
if(enemy.effects.slow>0){ctx.shadowColor='#4488ff';ctx.shadowBlur=8}
if(enemy.effects.burn>0){ctx.shadowColor='#ff4400';ctx.shadowBlur=10}
ctx.drawImage(sp,x-sw/2,y-sh+8,sw,sh);ctx.restore();
if(enemy.effects.confusion>0){const t=Date.now()/200;ctx.fillStyle='#ff0';ctx.font='12px sans-serif';for(let i=0;i<3;i++){const a=t+i*2.1;ctx.fillText('\u2605',x+Math.cos(a)*15,y-sh+Math.sin(a)*8-5)}}
// HP bar
const bw=30,bh=4,hr=Math.max(0,enemy.hp/enemy.maxHp);
const hpY=y-sh+2;
ctx.fillStyle='#333';ctx.fillRect(x-bw/2,hpY,bw,bh);
ctx.fillStyle=hr>.6?'#2ecc71':hr>.3?'#f39c12':'#e74c3c';ctx.fillRect(x-bw/2,hpY,bw*hr,bh);
if(enemy.maxShield>0&&enemy.shield>0){ctx.fillStyle='#3498db';ctx.fillRect(x-bw/2,hpY-3,bw*(enemy.shield/enemy.maxShield),2)}
ctx.strokeStyle='#111';ctx.lineWidth=.5;ctx.strokeRect(x-bw/2,hpY,bw,bh)}

// --- Event Listeners ---
function setupEvents(){
const canvas=document.getElementById('gameCanvas');
canvas.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect(),sx=960/r.width,sy=640/r.height;mouseX=(e.clientX-r.left)*sx;mouseY=(e.clientY-r.top)*sy;mouseGridPos=screenToGrid(mouseX,mouseY)});
canvas.addEventListener('click',e=>{
if(gameState.phase==='title'||gameState.phase==='gameOver'||gameState.phase==='victory')return;
const r=canvas.getBoundingClientRect(),sx=960/r.width,sy=640/r.height;
const cx=(e.clientX-r.left)*sx,cy=(e.clientY-r.top)*sy,g=screenToGrid(cx,cy);
if(gameState.placingTower){if(placeTower(gameState.placingTower,g.col,g.row))gameState.placingTower=null;return}
const ct=towers.find(t=>t.col===g.col&&t.row===g.row);gameState.selectedTower=ct||null});
canvas.addEventListener('contextmenu',e=>{e.preventDefault();gameState.placingTower=null;gameState.selectedTower=null});
['gordas','laugh','bandeus','dude','camarao','mano','rose'].forEach(t=>{
const b=document.getElementById('shop-'+t);if(b)b.addEventListener('click',e=>{e.stopPropagation();if(gameState.gold>=TOWER_DATA[t].cost){gameState.placingTower=t;gameState.selectedTower=null}else showError(UI_TEXT.noGold)})});
document.getElementById('nextWaveBtn').addEventListener('click',()=>{if(gameState.phase==='building')startWave()});
document.getElementById('speedBtn').addEventListener('click',()=>{gameState.speed=gameState.speed===1?2:1;document.getElementById('speedBtn').textContent=gameState.speed+'x'});
document.getElementById('pauseBtn').addEventListener('click',()=>{gameState.paused=!gameState.paused;document.getElementById('pauseBtn').textContent=gameState.paused?UI_TEXT.resume:UI_TEXT.pause});
document.getElementById('upgradeBtn').addEventListener('click',()=>{if(gameState.selectedTower)upgradeTower(gameState.selectedTower)});
document.getElementById('sellBtn').addEventListener('click',()=>{if(gameState.selectedTower)sellTower(gameState.selectedTower)});
document.getElementById('startBtn').addEventListener('click',()=>{initAudio();resetGame();gameState.phase='building';gameState.startTime=Date.now();document.getElementById('titleScreen').style.display='none'});
document.getElementById('loadBtn').addEventListener('click',()=>{initAudio();loadGame();document.getElementById('titleScreen').style.display='none'});
document.getElementById('restartBtn').addEventListener('click',()=>{resetGame();document.getElementById('gameOverScreen').style.display='none'});
document.getElementById('menuBtn').addEventListener('click',()=>{resetGame();gameState.phase='title';document.getElementById('gameOverScreen').style.display='none';document.getElementById('titleScreen').style.display='flex'});
document.getElementById('menuBtnVictory').addEventListener('click',()=>{resetGame();gameState.phase='title';document.getElementById('victoryScreen').style.display='none';document.getElementById('titleScreen').style.display='flex'})}

// --- Save/Load ---
function saveGame(){try{localStorage.setItem('thrucafe_save',JSON.stringify({towers:towers.map(t=>({type:t.type,col:t.col,row:t.row,level:t.level,totalInvested:t.totalInvested})),waveIndex:gameState.waveIndex,gold:gameState.gold,lives:gameState.lives,score:gameState.score}))}catch(e){}}
function loadGame(){try{const d=JSON.parse(localStorage.getItem('thrucafe_save'));if(!d){showError('Nenhum save!');return}resetGame();gameState.waveIndex=d.waveIndex||0;gameState.gold=d.gold||250;gameState.lives=d.lives||20;gameState.score=d.score||0;gameState.phase='building';gameState.startTime=Date.now();if(d.towers)d.towers.forEach(t=>{const tw=createTower(t.type,t.col,t.row);tw.level=t.level||0;tw.totalInvested=t.totalInvested||TOWER_DATA[t.type].cost;towers.push(tw)})}catch(e){showError('Erro ao carregar!')}}
function resetGame(){gameState.gold=INITIAL_GOLD;gameState.lives=INITIAL_LIVES;gameState.score=0;gameState.waveIndex=0;gameState.speed=1;gameState.paused=false;gameState.phase='building';gameState.selectedTower=null;gameState.placingTower=null;gameState.startTime=Date.now();towers=[];enemies=[];projectiles=[];particles=[];pendingSpawns=[];document.getElementById('speedBtn').textContent='1x';document.getElementById('pauseBtn').textContent=UI_TEXT.pause}

// --- Modals ---
let lastModalPhase=null;
function checkModals(){
if(gameState.phase==='gameOver'&&lastModalPhase!=='gameOver'){lastModalPhase='gameOver';saveGame();document.getElementById('gameOverScreen').style.display='flex';document.getElementById('finalScore').textContent=gameState.score}
if(gameState.phase==='victory'&&lastModalPhase!=='victory'){lastModalPhase='victory';document.getElementById('victoryScreen').style.display='flex';document.getElementById('victoryScore').textContent=gameState.score;const ts=Math.floor((gameState.totalTime||(Date.now()-gameState.startTime))/1000);document.getElementById('victoryTime').textContent=Math.floor(ts/60)+'min '+ts%60+'s'}
if(gameState.phase==='building'&&gameState.waveIndex>0&&lastModalPhase!=='building'){lastModalPhase='building';saveGame()}
if(gameState.phase!=='gameOver'&&gameState.phase!=='victory')lastModalPhase=gameState.phase}

// --- Game Loop ---
let lastTime=0;
function gameLoop(now){const dt=Math.min((now-lastTime)/1000,0.05);lastTime=now;update(dt);render();checkModals();requestAnimationFrame(gameLoop)}

// --- Init ---
function init(){preRenderSprites();setupEvents();gameState.phase='title';document.getElementById('titleScreen').style.display='flex';requestAnimationFrame(gameLoop)}
window.addEventListener('load',init);
</script></html>
